name: "CMTrace Open: Release"

on:
  push:
    tags:
      - "v*"

defaults:
  run:
    working-directory: cmtrace-open

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            label: macOS-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cmtrace-open/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: cmtrace-open
          tagName: ${{ github.ref_name }}
          releaseName: "CMTrace Open ${{ github.ref_name }}"
          releaseBody: |
            ## CMTrace Open ${{ github.ref_name }}

            Open-source CMTrace log viewer with built-in Intune diagnostics.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows (x64) | `.msi` installer |
            | macOS (ARM) | `.dmg` disk image |
            | macOS (Intel) | `.dmg` disk image |
            | Linux (x64) | `.deb` / `.AppImage` |
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
