name: "CMTrace Open: CI"

on:
  push:
    branches: [main]
    paths:
      - "cmtrace-open/**"
  pull_request:
    branches: [main]
    paths:
      - "cmtrace-open/**"

defaults:
  run:
    working-directory: cmtrace-open

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            cmtrace-open/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('cmtrace-open/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Rust check
        working-directory: cmtrace-open/src-tauri
        run: cargo check

      - name: Rust tests
        working-directory: cmtrace-open/src-tauri
        run: cargo test

      - name: Rust clippy
        working-directory: cmtrace-open/src-tauri
        run: cargo clippy -- -D warnings || true

  frontend:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cmtrace-open/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

  build:
    name: Build (${{ matrix.label }})
    needs: [check, frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            label: macOS-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cmtrace-open/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            cmtrace-open/src-tauri/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('cmtrace-open/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: cmtrace-open
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cmtrace-open-${{ matrix.label }}
          path: |
            cmtrace-open/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            cmtrace-open/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            cmtrace-open/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            cmtrace-open/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            cmtrace-open/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            cmtrace-open/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: warn
